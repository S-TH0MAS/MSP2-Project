name: Infrastructure GitOps

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    # 💡 Déclenche le workflow sur toutes les PR pour valider les verrous,
    # peu importe les fichiers modifiés (évite le blocage infini en jaune)
    types: [opened, synchronize, reopened]

jobs:
  # -------------------------------------------------------------
  # Job 1 : Exécuté sur TOUTES les branches et Pull Requests
  # Sauf push dont le message commence par "chore" (ex. verrous via Discord)
  # -------------------------------------------------------------
  check-security-locks:
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore')
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du Code source
        uses: actions/checkout@v4
        with:
          # 💡 Récupère le bon commit de la PR si l'événement est une Pull Request
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - name: Configuration de Node.js (v24)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Installation des dépendances
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Exécution du script de conformité
        env:
          GITHUB_ACTOR: ${{ github.actor }}
        run: node scripts/lockowners/check-locks.js

  # -------------------------------------------------------------
  # Job 2 : Ne se lance QUE sur 'main' ou 'dev' ET si le Job 1 a réussi
  # -------------------------------------------------------------
  sync-discord:
    runs-on: ubuntu-latest
    needs: check-security-locks
    # 💡 Push sur main/dev uniquement — pas les PR, pas les commits "chore*" (bot Discord)
    if: |
      github.event_name == 'push' &&
      (github.ref_name == 'main' || github.ref_name == 'dev') &&
      !startsWith(github.event.head_commit.message, 'chore')

    steps:
      - name: Checkout Code (Avec tout l'historique Git)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration de Node.js (v24)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Installation des dépendances
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Déploiement de l'Infrastructure Discord
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
        run: node scripts/discord/configure.js