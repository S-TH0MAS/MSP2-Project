name: Infrastructure GitOps

on:
  push:
    # 💡 On retire le filtre de branche global ici pour écouter TOUTES les branches
    paths:
      - 'scripts/discord/configure.js'
      - 'scripts/discord/data.js'
      - 'docs/**'
      - '.lockowners'
      - 'scripts/lockowners/check-locks.js'

jobs:
  # -------------------------------------------------------------
  # Job 1 : Exécuté sur ABSOLUMENT TOUTES les branches
  # -------------------------------------------------------------
  check-security-locks:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du Code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configuration de Node.js (v24)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Installation des dépendances
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Exécution du script de conformité
        env:
          GITHUB_ACTOR: ${{ github.actor }}
        run: node scripts/lockowners/check-locks.js

  # -------------------------------------------------------------
  # Job 2 : Ne se lance QUE sur 'main' ou 'dev' ET si le Job 1 a réussi
  # -------------------------------------------------------------
  sync-discord:
    runs-on: ubuntu-latest
    needs: check-security-locks
    # 💡 Cette condition magique bloque l'exécution si on est sur une autre branche
    if: github.ref_name == 'main' || github.ref_name == 'dev'

    steps:
      - name: Checkout Code (Avec tout l'historique Git)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration de Node.js (v24)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Installation des dépendances
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Déploiement de l'Infrastructure Discord
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
        run: node scripts/discord/configure.js