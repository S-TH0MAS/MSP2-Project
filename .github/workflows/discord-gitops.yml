name: Discord Infrastructure & Files GitOps

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'scripts/discord/configure.js'
      - 'scripts/discord/data.js'
      - 'docs/**'

jobs:
  sync-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code (Avec tout l'historique Git)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installation des dépendances
        run: npm ci

      - name: Déploiement de l'Infrastructure et Synchronisation des Fichiers
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
        run: node scripts/discord/configure.js
